# =============================================================================
#  ~/.tmux.conf  —  managed by iterm-dotfiles
#
#  Design:
#    * True-color passthrough so p10k gradients and Nerd Font glyphs render
#      correctly inside iTerm2 and GNOME Terminal.
#    * Clipboard is platform-aware: pbcopy on macOS, xclip/wl-copy on Linux.
#    * Prefix is Ctrl-a (easier to reach than the default Ctrl-b).
#    * Vi copy-mode mirrors shell / Vim muscle memory.
#    * Status bar is minimal — p10k already shows git/python/scala context
#      in the prompt, so the bar just shows session name + time.
# =============================================================================

# ── Terminal & color ─────────────────────────────────────────────────────────
# tmux-256color tells ncurses we support 256 colors + italics.
# The Tc override enables 24-bit true-color passthrough to the outer terminal.
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*-256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── General behavior ─────────────────────────────────────────────────────────
set -g  mouse on                  # click to select panes/windows; scroll
set -g  history-limit 50000       # match .zshrc HISTSIZE
set -g  display-time 3000         # show status messages for 3 s
set -sg escape-time 0             # no ESC delay (critical for Vim / p10k)
set -g  focus-events on           # lets Vim and p10k react to focus changes
set -g  set-clipboard on          # forward tmux clipboard to the outer terminal

# ── Window / pane numbering ──────────────────────────────────────────────────
set -g  base-index 1              # windows start at 1, not 0
setw -g pane-base-index 1         # panes start at 1, not 0
set -g  renumber-windows on       # close window 3 → 4 becomes 3

# ── Prefix key ───────────────────────────────────────────────────────────────
# Ctrl-a (screen-style). To keep the default Ctrl-b, comment these three lines.
unbind C-b
set -g prefix C-a
bind  C-a send-prefix             # Ctrl-a Ctrl-a → send literal Ctrl-a to shell

# ── Key bindings ─────────────────────────────────────────────────────────────
# Reload config without restarting the server
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Split panes and stay in the current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (hold prefix, then repeat the key)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi) ───────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Platform-aware clipboard
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y              send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
} {
  # Linux: try xsel → xclip → wl-copy (covers X11 and Wayland)
  bind -T copy-mode-vi y              send -X copy-pipe-and-cancel \
    "xsel --clipboard --input 2>/dev/null || xclip -in -selection clipboard 2>/dev/null || wl-copy"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel \
    "xsel --clipboard --input 2>/dev/null || xclip -in -selection clipboard 2>/dev/null || wl-copy"
}

# ── Status bar ───────────────────────────────────────────────────────────────
# Neutral dark colors that don't clash with light or dark p10k themes.
# Customize the hex values to match your iTerm2 color scheme if desired.
set -g status-position  bottom
set -g status-interval  5

set -g status-style                "bg=colour235 fg=colour250"
set -g window-status-current-style "bg=colour33  fg=colour235 bold"
set -g window-status-style         "fg=colour244"
set -g message-style               "bg=colour235 fg=colour203"
set -g pane-border-style           "fg=colour238"
set -g pane-active-border-style    "fg=colour33"

set -g status-left        " #[bold]#S#[nobold]  "   # session name
set -g status-left-length 20
set -g status-right       " %H:%M  %d %b "          # time + short date
set -g status-right-length 30
